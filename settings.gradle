pluginManagement {
    repositories {
        gradlePluginPortal()
        mavenCentral()
    }
    plugins {
        id 'io.micronaut.application' version providers.gradleProperty('micronautGradlePluginVersion').get()
        id 'io.micronaut.library' version providers.gradleProperty('micronautGradlePluginVersion').get()
    }
}

rootProject.name = 'constructraos'

include(
    ':libraries:commons',
    ':libraries:project-records',
    ':libraries:persistence',
    ':libraries:clients',
    ':services:api-service',
    ':services:codex-bridge',
    ':services:orchestration',
    ':services:policy-service',
    ':services:ui-service'
)
