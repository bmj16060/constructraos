server {
  listen 8090;
  server_name _;

  root /var/run/constructraos-ui-config/web-root;
  index index.html;

  location = /healthz {
    default_type application/json;
    return 200 '{"status":"ok"}';
  }

  location = /config.json {
    default_type application/json;
    alias /var/run/constructraos-ui-config/config.json;
    add_header Cache-Control "no-store";
  }

  location = /readyz {
    default_type application/json;
    return 200 '{"status":"ready"}';
  }

  include /var/run/constructraos-ui-config/local-proxy.conf;

  location /assets/ {
    try_files $uri =404;
    access_log off;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location = /favicon.ico {
    try_files $uri =404;
    access_log off;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
