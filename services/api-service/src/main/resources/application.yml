micronaut:
  application:
    name: api-service
  mcp:
    server:
      endpoint: /mcp
      transport: HTTP
      info:
        name: constructraos-api
        version: 0.1.0
  server:
    port: 8080

datasources:
  default:
    db-type: postgres
    dialect: POSTGRES
    url: jdbc:postgresql://${POSTGRES_HOST:127.0.0.1}:${POSTGRES_PORT:5432}/${POSTGRES_DB:constructraos}
    username: ${POSTGRES_USER:constructraos}
    password: ${POSTGRES_PASSWORD:constructraos}
    schema-generate: NONE
    maximum-pool-size: 10

flyway:
  datasources:
    default:
      enabled: true
      locations:
        - classpath:db/migration

temporal:
  address: ${TEMPORAL_ADDRESS:127.0.0.1:7233}
  namespace: ${TEMPORAL_NAMESPACE:default}

anon-session:
  cookie-name: ${ANON_SESSION_COOKIE_NAME:constructraos_anon_session}
  signing-secret: ${ANON_SESSION_SIGNING_SECRET:constructraos-local-anon-session-secret}
  cookie-secure: ${ANON_SESSION_COOKIE_SECURE:false}
  cookie-domain: ${ANON_SESSION_COOKIE_DOMAIN:}
  max-age-days: ${ANON_SESSION_MAX_AGE_DAYS:30}

policy:
  service-url: ${POLICY_SERVICE_URL:`http://127.0.0.1:8082`}
  service-enforce: ${POLICY_SERVICE_ENFORCE:true}

graph:
  enabled: ${GRAPH_ENABLED:false}
  uri: ${GRAPH_URI:}

otel:
  traces:
    exporter: ${OTEL_TRACES_EXPORTER:none}
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:`http://localhost:4318`}
      protocol: ${OTEL_EXPORTER_OTLP_PROTOCOL:http/protobuf}
  service:
    name: ${OTEL_SERVICE_NAME:api-service}
  propagators: tracecontext,baggage
