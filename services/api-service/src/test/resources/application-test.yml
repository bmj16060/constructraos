micronaut:
  server:
    port: -1

datasources:
  default:
    db-type: h2
    dialect: H2
    url: jdbc:h2:mem:constructraos-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

flyway:
  datasources:
    default:
      enabled: false

policy:
  service-enforce: false
